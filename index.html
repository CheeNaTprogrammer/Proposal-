<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<title>Girlfriend Question</title>

<style>
    

body {
    margin: 0;
    text-align: center;
    font-family: Arial, sans-serif;
    background-color: #f887b4;
}

h1 {
    margin-top: 20px;
    font-size: 32px;
}

/* FULL SCREEN BOX */
#box {
    width: 90vw;
    height: 70vh;
    margin: 20px auto;

    position: relative;

    /* ✨ Crystal Glass Effect */
    background: rgba(255, 255, 255, 0.12);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);

    /* 🧊 Border glow */
    border: 1px solid rgba(255, 255, 255, 0.25);
    border-radius: 20px;

    /* 🌫️ Floating shadow (air effect) */
    box-shadow:
        0 15px 40px rgba(0, 0, 0, 0.25),
        0 5px 15px rgba(255, 77, 136, 0.88);

    /* smooth hover float feel */
    transition: transform 0.3s ease;
}

/* optional hover floating effect */
#box:hover {
    transform: translateY(-3px);
}

button {
    padding: 12px 25px;
    font-size: 18px;
    font-weight: bold;

    border: none;
    border-radius: 12px;
    cursor: pointer;

    color: black;

    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);

    border: 1px solid rgba(255, 255, 255, 0.3);

    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);

    transition: all 0.1s ease;
}

/* YES button position */
#yesBtn {
    position: absolute;
    left: 30%;
    top: 50%;
}

/* NO button MUST be absolute */
#noBtn {
    position: absolute;
    left: 60%;
    top: 50%;

    transition: left 0.15s linear, top 0.15s linear;
}


#cat {
    display: none;
    margin-top: 10px;
}

.header {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;

    margin-top: 20px;
}

/* Image styling */
.header img {
    width: 120px;
    height: auto;
}
#heart-container {
    position: fixed;
    width: 100%;
    height: 100%;
    top: 0;
    left: 0;
    overflow: hidden;
    z-index: 0; /* behind everything */
    pointer-events: none;
}

.heart {
    position: absolute;
    color: rgba(255, 0, 100, 0.6);
    font-size: 20px;
    animation: floatUp 5s linear forwards;
}

/* floating animation */
@keyframes floatUp {
    0% {
        transform: translateY(0) scale(1);
        opacity: 1;
    }
    100% {
        transform: translateY(-100vh) scale(1.5);
        opacity: 0;
    }
}

/* keep your box above hearts */
#box {
    position: relative;
    z-index: 1;
}



</style>
</head>

<body>
    <div id="heart-container"></div>

<div class="header">
    
    <img src="cat.png" alt="cat">
    <h1>Do you want to be my date? ❤️</h1>  

</div>


<div id="box">

<!-- FIXED YES BUTTON -->
<button id="yesBtn" onclick="goToPage()">Yes</button>

<button id="noBtn">No</button>

</div>

<script>
    
const box = document.getElementById("box");
const noBtn = document.getElementById("noBtn");

// position + velocity
let x = noBtn.offsetLeft;
let y = noBtn.offsetTop;
let vx = 0;
let vy = 0;

/* =========================
   APPLY FORCE (CORE ENGINE)
========================= */

function applyForce(clientX, clientY) {

    const rect = box.getBoundingClientRect();

    const mouseX = clientX - rect.left;
    const mouseY = clientY - rect.top;

    const btnX = x + noBtn.offsetWidth / 2;
    const btnY = y + noBtn.offsetHeight / 2;

    let dx = btnX - mouseX;
    let dy = btnY - mouseY;

    let distance = Math.sqrt(dx * dx + dy * dy);

    // prevent division errors
    if (distance === 0) return;

    if (distance < 220) {

        dx /= distance;
        dy /= distance;

        // 🔥 stronger force when closer
        const force = (220 - distance) * 0.4;

        vx += dx * force;
        vy += dy * force;
    }
}

/* =========================
   MOUSE SUPPORT
========================= */

box.addEventListener("mousemove", (e) => {
    applyForce(e.clientX, e.clientY);
});

/* =========================
   TOUCH SUPPORT (FIX FOR MOBILE)
========================= */

box.addEventListener("touchmove", (e) => {
    const t = e.touches[0];
    applyForce(t.clientX, t.clientY);
});

/* =========================
   PHYSICS LOOP
========================= */

function update() {

    const maxX = box.clientWidth - noBtn.offsetWidth;
    const maxY = box.clientHeight - noBtn.offsetHeight;

    x += vx;
    y += vy;

    vx *= 0.85;
    vy *= 0.85;

    if (x < 0) { x = 0; vx *= -1; }
    if (y < 0) { y = 0; vy *= -1; }
    if (x > maxX) { x = maxX; vx *= -1; }
    if (y > maxY) { y = maxY; vy *= -1; }

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";

    requestAnimationFrame(update);
}

update();

/* =========================
   YES BUTTON
========================= */

function goToPage() {
    window.location.href = "number.html";
}

/* =========================
   HEARTS
========================= */

function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");

    heart.innerHTML = "❤️";

    heart.style.left = Math.random() * 100 + "vw";
    heart.style.top = "100vh";
    heart.style.fontSize = (10 + Math.random() * 25) + "px";

    document.getElementById("heart-container").appendChild(heart);

    setTimeout(() => heart.remove(), 5000);
}

setInterval(createHeart, 300);

/* =========================
   MOBILE HEART TRAIL
========================= */

document.addEventListener("touchmove", function(e) {

    const touch = e.touches[0];

    const trail = document.createElement("div");

    trail.innerHTML = "💖";

    trail.style.position = "fixed";
    trail.style.left = touch.clientX + "px";
    trail.style.top = touch.clientY + "px";

    trail.style.fontSize = "14px";
    trail.style.pointerEvents = "none";
    trail.style.zIndex = "999";

    document.body.appendChild(trail);

    setTimeout(() => trail.remove(), 300);
});



</script>

</body>
</html>
